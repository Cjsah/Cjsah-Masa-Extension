name: Mod Build

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/**
      - src/**
      - versions/**
      - ModWrapper/**
      - build.gradle
      - common.gradle
      - gradle.properties
      - settings.gradle

jobs:
  build:
    strategy:
      matrix:
        java: [ 25 ]
        distro: [ zulu ]
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    env:
      CI_BUILD: true
      PR_BUILD: false
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: ${{ matrix.distro }}
          java-version: ${{ matrix.java }}
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean :ModWrapper:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: 'Artifacts'
          path: ./ModWrapper/build/libs/*.jar

